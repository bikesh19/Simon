<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simon</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
</head>

<body>
  <h1 id="level-title">Tap Start to Play</h1>
  <div class="actions">
    <button id="start-btn" aria-label="Start Simon game">Start Game</button>
    <button id="how-to-play-btn" aria-expanded="false" aria-controls="how-to-play-panel">How to Play</button>
  </div>
  <section id="how-to-play-panel" class="how-to-play" aria-hidden="true">
    <h2>How to Play</h2>
    <p>Press <strong>Start Game</strong> to begin. Watch the flashing color sequence, then repeat it in the same order.</p>
    <p>You can click/tap the color pads, or on laptop use <strong>r, b, g, y</strong> keys.</p>
    <p>Each round adds one new color. A wrong move ends the game.</p>
  </section>
  <div class="container">
    <div class="row">

      <div type="button" id="green" class="btn green">

      </div>

      <div type="button" id="red" class="btn red">

      </div>
    </div>

    <div class="row">

      <div type="button" id="yellow" class="btn yellow">

      </div>
      <div type="button" id="blue" class="btn blue">

      </div>

    </div>

  </div>
  <h2 id="highScore">High Score 0</h2>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="game.js"></script>
</body>

</html>
